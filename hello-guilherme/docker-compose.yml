version: "3.7"

services:

  app_proxy:
    environment:
      # The format here is: <app-id>_<docker-service-name>_1
      APP_HOST: hello-guilherme_server_1
      APP_PORT: 3000

  server:
    image: nginx:alpine
    user: "1000:1000"
    # init: true
    restart: on-failure
    volumes:
      - ${APP_DATA_DIR}/data:/usr/share/nginx/html:ro
